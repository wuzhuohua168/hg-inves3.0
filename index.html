*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#f0f3f7;
    font-family:-apple-system,sans-serif;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:auto;
}
body.draw-mode{
    overflow:hidden;
}
body.chart-collapsed{
    overflow:auto;
}
body.chart-collapsed .main{
    flex:initial;
    min-height:auto;
}
body.chart-collapsed .control-panel{
    max-height:none;
}
body.chart-collapsed #macroPanel{
    min-height:60dvh;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.control-panel{
    background:#fff;
    padding:10px;
    border-bottom:1px solid #eee;
    overflow:visible;
    max-height:45vh;
    overflow:auto;
}

.action-row{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}
.action-row button{
    white-space:nowrap;
}

.chart-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-bottom:10px;
}
.chart-grid.collapsed{
    display:none;
}

.quote-tile{
    position:relative;
    background:#f1f3f6;
    border-radius:8px;
    overflow:hidden;
    height:54px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
}

.quote-label{
    font-size:9px;
    color:#555;
    pointer-events:none;
    white-space:nowrap;
}

.quote-click{
    position:absolute;
    inset:0;
    cursor:pointer;
    z-index:3;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#chart-wrap{
    flex:1;
    width:100%;
    position:relative;
    touch-action: none;
    overscroll-behavior: contain;
}
#stock-chart-container{
    width:100%;
    height:100%;
    position:relative;
    z-index:1;
    touch-action: none;
    overscroll-behavior: contain;
}
#stock-chart-container iframe{
    position:relative;
    z-index:1;
    touch-action: none;
    overscroll-behavior: contain;
}

#cycle-bar{
    position:absolute;
    left:10px;
    bottom:36px;
    display:flex;
    gap:6px;
    padding:4px 6px;
    background:rgba(255,255,255,0.9);
    border:1px solid #eee;
    border-radius:8px;
    z-index:10;
    pointer-events:auto;
}
.cycle-btn{
    padding:4px 8px;
    font-size:12px;
    background:#f3f4f6;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}
.cycle-btn:hover{background:#dbeafe;}
.cycle-btn.active{background:#dbeafe;color:#1e40af;font-weight:bold;}

#macroLight{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#3b82f6;
    color:#fff;
}

#macroAdvice{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#e0f2fe;
    color:#000;
}

#macroMeta{
    margin-top:6px;
    font-size:11px;
    color:#666;
}

#alertPanel{
    margin-top:8px;
    padding:8px;
    border-radius:8px;
    background:#fff7ed;
    border:1px solid #fed7aa;
}
#alertTitle{
    font-weight:bold;
    font-size:12px;
    color:#9a3412;
    margin-bottom:6px;
}
#alertList{
    font-size:12px;
    color:#3f3f46;
}
#alertList .alert-title-en{
    font-size:12px;
    color:#111827;
}
#alertList .alert-title-cn{
    font-size:12px;
    color:#2563eb;
}
#alertList ul{
    margin:6px 0 0 16px;
    padding:0;
}
.alert-tag{
    display:inline-block;
    padding:2px 6px;
    border-radius:6px;
    font-size:11px;
    background:#fee2e2;
    color:#991b1b;
    margin-right:6px;
}
.alert-meta{
    font-size:11px;
    color:#6b7280;
    margin-top:6px;
}

.macro-tag-row{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:6px;
}
.macro-tag{
    border:none;
    background:#eef2ff;
    color:#1e3a8a;
    padding:4px 8px;
    border-radius:6px;
    font-size:11px;
    cursor:pointer;
}
.macro-tag:hover{
    background:#c7d2fe;
}

.macro-layout{
    display:grid;
    grid-template-columns:1.3fr 1fr;
    gap:10px;
    align-items:start;
}

.panel-collapsed{
    display:none !important;
}

#macroPanel {
    overflow: hidden;
    max-height: 5000px;
    transition: max-height 0.35s ease, opacity 0.35s ease, visibility 0s linear 0.35s; /* 延迟 visibility */
    will-change: max-height, opacity; /* 优化性能 */
}

#macroPanel.collapsed {
    max-height: 0 !important;
    opacity: 0;
    visibility: hidden;
    pointer-events: none;      /* 防止残留区域还能点 */
    height: 0 !important;      /* 强制高度归零 */
    padding: 0 !important;     /* 清除内边距 */
    margin: 0 !important;      /* 清除外边距 */
}

/* 展开时立即可见 */
#macroPanel:not(.collapsed) {
    visibility: visible;
    opacity: 1;
    transition-delay: 0s; /* 展开时立即显示 */
}

.signal{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}
.green{background:#00ff90;}
.yellow{background:#ffd000;}
.red{background:#ff4040;}

#translate-panel,
#news-panel{
    display:none;
    border-top:1px solid #eee;
    flex:1;
    min-height:70dvh;
}
#translate-panel iframe,
#news-panel iframe{
    width:100%;
    height:100dvh;
    border:0;
}

#back-to-quotes{
    position:fixed;
    right:12px;
    bottom:12px;
    z-index:20;
    background:#111827;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    display:none;
}


@media (max-width: 900px){
    body{
        overflow:auto;
    }
    .main{
        flex:initial;
        min-height:100dvh;
    }
    .control-panel{
        max-height:none;
        overflow:visible;
    }
    #macroPanel .macro-layout{
        grid-template-columns:1fr;
    }
    .chart-grid{
        grid-template-columns:repeat(2,1fr);
    }
    .quote-tile{
        height:60px;
        padding:6px;
    }
    .quote-label{
        font-size:11px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.8);
        transform-origin:left center;
    }
    #chart-wrap{
        min-height:70dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:70dvh;
    }
}

@media (max-width: 600px){
    .control-panel{
        max-height:none;
        overflow:visible;
    }
    #macroPanel .macro-layout{
        grid-template-columns:1fr;
    }
    .quote-tile{
        height:56px;
    }
    .quote-label{
        font-size:10px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.7);
        transform-origin:left center;
    }
    #chart-wrap{
        min-height:100dvh;
        height:100dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:100dvh;
        height:100dvh;
    }
}

.rsi-timeframe-row{

.rsi-tf-label{

function initQuoteObserver(){
    const lazyQuotes = Array.from(document.querySelectorAll(".lazy-quote"));
    if (!("IntersectionObserver" in window)){
        lazyQuotes.forEach(el => {
            if (!el.dataset.loaded){
                const sym = el.dataset.displaySymbol || el.dataset.symbol;
                appendSingleQuoteWidget(el, sym);
                el.dataset.loaded = "1";
            }
        });
        return;
    }
    if (quoteObserver) quoteObserver.disconnect();
    quoteObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting){
                const el = entry.target;
                if (!el.dataset.loaded){
                    const sym = el.dataset.displaySymbol || el.dataset.symbol;
                    appendSingleQuoteWidget(el, sym);
                    el.dataset.loaded = "1";
                }
                quoteObserver.unobserve(el);
            }
        });
    }, { root: null, rootMargin: "100px", threshold: 0.1 });

    lazyQuotes.forEach(el => quoteObserver.observe(el));
}

function normalizeChartSymbol(symbol){
    const raw = String(symbol || "").trim().toUpperCase();
    if (!raw) return "";
    if (tvSymbolMap[raw]) return tvSymbolMap[raw];
    if (raw.includes(":")) return raw;

    const ssMatch = raw.match(/^(\d{6})\.(SS|SH|SSE)$/);
    if (ssMatch) return `SSE:${ssMatch[1]}`;
    const szMatch = raw.match(/^(\d{6})\.(SZ|SZSE)$/);
    if (szMatch) return `SZSE:${szMatch[1]}`;
    const bseMatch = raw.match(/^(\d{6})\.(BJ|BSE)$/);
    if (bseMatch) return `BSE:${bseMatch[1]}`;

    const shPrefix = raw.match(/^SH(\d{6})$/);
    if (shPrefix) return `SSE:${shPrefix[1]}`;
    const szPrefix = raw.match(/^SZ(\d{6})$/);
    if (szPrefix) return `SZSE:${szPrefix[1]}`;
    const bjPrefix = raw.match(/^BJ(\d{6})$/);
    if (bjPrefix) return `BSE:${bjPrefix[1]}`;

    if (/^\d{6}$/.test(raw)){
        if (/^[569]/.test(raw) || /^(600|601|603|605|688|689)/.test(raw)) return `SSE:${raw}`;
        if (/^[0123]/.test(raw) || /^(000|001|002|003|300|301)/.test(raw)) return `SZSE:${raw}`;
        if (/^(4|8)/.test(raw)) return `BSE:${raw}`;
    }

    return raw;
}

    const wti = oilStress.wti != null ? oilStress.wti.toFixed(2) : "N/A";

    const days = oilStress.brentAbove115Days != null ? oilStress.brentAbove115Days : "N/A";
    const wtiT90 = (oilStress.spread != null) ? (90 - oilStress.spread).toFixed(2) : "N/A";

    if (oilStress.level === 3) explain = "油价进入需求破坏区，滞胀风险上升。";
    if (oilStress.level == null) explain = "数据缺失，无法判断油价压力等级。";

    return `
        <div><strong>能源压力等级：</strong>${level}</div>
        <div>Brent（EIA spot）：${brent}${brentDate ? `（${brentDate}）` : ""}｜WTI：${wti}${oilDate ? `（${oilDate}）` : ""}｜Spread：${spread}</div>

        </div>
        <div style="font-size:11px;color:#6b7280;">

        <div>${explain}</div>
        <div style="font-size:11px;color:#6b7280;">期货价格仅作行情参考，不参与宏观评分。</div>`;
}

function buildEventImpact(){
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const newsText = newsAlerts.map(a => typeof a === "string" ? a : (a.title || "")).join(" ");
    const marketText = marketAlerts.join(" ");
    const text = (newsText + " " + marketText).toLowerCase();

    const hasWar = text.includes("war") || text.includes("战争") || text.includes("冲突") || text.includes("iran") || text.includes("中东");
    const hasOilShock = text.includes("oil") || text.includes("油价") || text.includes("能源");
    const hasRate = text.includes("rate") || text.includes("加息") || text.includes("hike");

    const lines = [];
    if (hasWar || hasOilShock){
        lines.push("地缘/能源扰动 → 短期利好能源与黄金，利空航空/高耗能行业");
    }
    if (hasRate){
        lines.push("利率收紧 → 成长股承压，现金与短债相对占优");
    }
    if (!lines.length){
        lines.push("暂无显著事件冲击信号");
    }

    return `<div><strong>事件影响：</strong>${lines.join("；")}</div>`;
}

function getEventScore(){
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const newsText = newsAlerts.map(a => typeof a === "string" ? a : (a.title || "")).join(" ");
    const marketText = marketAlerts.join(" ");
    const text = (newsText + " " + marketText).toLowerCase();

    const hasWar = text.includes("war") || text.includes("战争") || text.includes("冲突") || text.includes("iran") || text.includes("中东");
    const hasOilShock = text.includes("oil") || text.includes("油价") || text.includes("能源");
    const hasRate = text.includes("rate") || text.includes("加息") || text.includes("hike");

    let eventScore = 0;
    if (hasWar) eventScore -= 1;
    if (hasOilShock) eventScore -= 1;
    if (hasRate) eventScore -= 1;
    return eventScore;
}

function buildConsistencyCheck(stage, ctx){
    const warns = [];
    if (stage === "滞胀" || stage === "衰退"){
        if (ctx.goldOilTrend !== "上升" && ctx.oilTrend !== "上升"){

            warns.push("铜油比/股油比未确认扩张");

    if (!warns.length){
        return `<div><strong>一致性检查：</strong>宏观信号与市场价格一致。</div>`;
    }
    return `<div><strong>一致性检查：</strong>${warns.join("；")}。</div>`;
}

function trendLabel(current, ma){
    if (current == null || ma == null || !Number.isFinite(current) || !Number.isFinite(ma)) return "N/A";
    const diff = (current - ma) / ma;
    if (diff > 0.01) return "上升";
    if (diff < -0.01) return "下降";
    return "持平";
}

            listEl.textContent = data && data.message ? data.message : "预警数据不可用";
            return;
        }

        const translateNewsTitle = (title) => {
            if (!title) return "";
            let t = title;
            const map = [
                [/war|conflict|clash|tensions/ig, "战争/冲突"],
                [/oil|crude|energy/ig, "油价/能源"],
                [/inflation/ig, "通胀"],
                [/rate hike|rates|yields|bond/ig, "利率/收益率"],
                [/stocks|equities|shares|index/ig, "股市/指数"],
                [/gold/ig, "黄金"],
                [/dollar|usd|dxy/ig, "美元/美元指数"],
                [/recession/ig, "衰退"],
                [/risk/ig, "风险"]
            ];
            const original = t;
            map.forEach(([re, cn]) => {
                t = t.replace(re, cn);
            });
            if (t === original) return "（无直译，保留英文原文）";
            return t;
        };

        const translateMarketAlert = (text) => {
            if (!text) return "";
            const m = text.match(/油价24h上涨([0-9.]+)%/);

            return "Market alert";

                    <div class="alert-title-en">EN: ${en}</div>

function wrapCanvasText(ctx, text, x, y, maxWidth, lineHeight){
    const paragraphs = String(text || "").split("\n");
    let currentY = y;
    paragraphs.forEach((paragraph, idx) => {
        if (!paragraph.trim()){
            currentY += lineHeight;
            return;
        }
        let line = "";
        for (const ch of paragraph) {
            const testLine = line + ch;
            if (ctx.measureText(testLine).width > maxWidth && line) {
                ctx.fillText(line, x, currentY);
                line = ch;
                currentY += lineHeight;
            } else {
                line = testLine;
            }
        }
        if (line) {
            ctx.fillText(line, x, currentY);
            currentY += lineHeight;
        }
        if (idx !== paragraphs.length - 1) currentY += 2;
    });
    return currentY;
}

function measureWrappedTextHeight(ctx, text, maxWidth, lineHeight){
    const paragraphs = String(text || "").split("\n");
    let height = 0;
    paragraphs.forEach((paragraph, idx) => {
        if (!paragraph.trim()){
            height += lineHeight;
            return;
        }
        let line = "";
        for (const ch of paragraph) {
            const testLine = line + ch;
            if (ctx.measureText(testLine).width > maxWidth && line) {
                height += lineHeight;
                line = ch;
            } else {
                line = testLine;
            }
        }
        if (line) height += lineHeight;
        if (idx !== paragraphs.length - 1) height += 2;
    });
    return height;
}

async function shareHighImpactAlertsImage(){
    const alertData = window.__alertData || {};
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const highImpact = newsAlerts.filter(item => typeof item !== "string" && Number(item.score) >= 6);

    if (!newsAlerts.length){
        alert("预警数据还没加载完成，请稍后再试。");
        return;
    }

    if (!highImpact.length){
        const lowerImpact = newsAlerts.filter(item => typeof item !== "string" && Number(item.score) >= 3);
        if (lowerImpact.length) {
            alert(`当前页面暂无三星以上新闻，现有 ${lowerImpact.length} 条一到二星新闻。`);
        } else {
            alert("当前页面暂无可导出的预警新闻。");
        }
        return;
    }

    const title = "宏观预警高影响新闻";
    const subtitle = alertData.summary || `导出时间：${new Date().toLocaleString()}`;
    const footer = "HGCD宏观事件";
    const width = 1080;
    const padding = 48;
    const lineHeight = 34;
    const itemGap = 22;
    const headerReserve = 180;
    const footerReserve = 180;

    let canvas, ctx;
    try {
        canvas = document.createElement("canvas");
        ctx = canvas.getContext("2d");
        if (!ctx) {
            throw new Error("Canvas context not available");
        }
    } catch (e) {
        alert("您的浏览器不支持图片生成功能");
        return;
    }

    ctx.font = "28px -apple-system, BlinkMacSystemFont, sans-serif";

    const blocks = highImpact.map((item, index) => {
        const stars = item.stars || "";
        const score = item.score != null ? `影响评分${item.score}分` : "";
        const en = `${index + 1}. ${item.title || ""} ${stars} ${score}`.trim();
        const cnBase = item.translated || "";
        const cn = cnBase ? `CN: ${cnBase}` : "";
        const link = item.link ? `来源: ${item.link}` : "";
        return [en, cn, link].filter(Boolean);
    });

    const measureHeight = () => {
        let h = padding + headerReserve;
        blocks.forEach(lines => {
            ctx.font = "28px -apple-system, BlinkMacSystemFont, sans-serif";
            h += measureWrappedTextHeight(ctx, lines[0], width - padding * 2, lineHeight);
            for (let i = 1; i < lines.length; i++) {
                ctx.font = i === 1
                    ? "24px -apple-system, BlinkMacSystemFont, sans-serif"
                    : "20px -apple-system, BlinkMacSystemFont, sans-serif";
                h += 4;
                h += measureWrappedTextHeight(ctx, lines[i], width - padding * 2 - 12, lineHeight);
            }
            h += itemGap + 12;
        });
        h += footerReserve;
        return h;
    };

    canvas.width = width;
    canvas.height = measureHeight();

    const gradient = ctx.createLinearGradient(0, 0, width, canvas.height);
    gradient.addColorStop(0, "#fff7ed");
    gradient.addColorStop(1, "#eff6ff");
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, width, canvas.height);

    ctx.fillStyle = "#9a3412";
    ctx.font = "bold 42px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.fillText(title, padding, 72);

    ctx.fillStyle = "#6b7280";
    ctx.font = "22px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.fillText(subtitle, padding, 112);

    let currentY = padding + 122;
    blocks.forEach(lines => {
        ctx.fillStyle = "#111827";
        ctx.font = "28px -apple-system, BlinkMacSystemFont, sans-serif";
        currentY = wrapCanvasText(ctx, lines[0], padding, currentY, width - padding * 2, lineHeight);
        for (let i = 1; i < lines.length; i++) {
            ctx.fillStyle = i === 1 ? "#1d4ed8" : "#6b7280";
            ctx.font = i === 1
                ? "24px -apple-system, BlinkMacSystemFont, sans-serif"
                : "20px -apple-system, BlinkMacSystemFont, sans-serif";
            currentY = wrapCanvasText(ctx, lines[i], padding + 12, currentY + 4, width - padding * 2 - 12, lineHeight);
        }
        currentY += itemGap;
        ctx.strokeStyle = "#fed7aa";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(padding, currentY - 10);
        ctx.lineTo(width - padding, currentY - 10);
        ctx.stroke();
        currentY += 12;
    });

    const footerTop = canvas.height - footerReserve + 56;
    ctx.strokeStyle = "#fdba74";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(padding, footerTop - 22);
    ctx.lineTo(width - padding, footerTop - 22);
    ctx.stroke();

    ctx.fillStyle = "#92400e";
    ctx.font = "bold 24px -apple-system, BlinkMacSystemFont, sans-serif";
    ctx.textAlign = "right";
    ctx.fillText(footer, width - padding, canvas.height - 64);
    ctx.textAlign = "left";

    const filename = `macro-alerts-${new Date().toISOString().slice(0,10)}.png`;
    const dataUrl = canvas.toDataURL("image/png");

    try{
        const blob = await new Promise((resolve) => canvas.toBlob(resolve, "image/png"));
        if (!blob) {
            throw new Error("无法生成图片文件");
        }
        const file = new File([blob], filename, { type: "image/png" });
        openAlertSharePreview({
            dataUrl,
            file,
            filename,
            count: highImpact.length,
            subtitle
        });
    }catch(err){
        console.error("分享图片生成失败:", err);
        alert("分享图片生成失败，请稍后重试。");
    }
}

let currentApiIndex = 0;
let apiFailCount = {};
let requestQueue = [];
let isProcessingQueue = false;
const MAX_CONCURRENT_REQUESTS = 3;
const REQUEST_DELAY = 200;

async function queueRequest(fn){
    return new Promise((resolve, reject) => {
        requestQueue.push({ fn, resolve, reject });
        processQueue();
    });
}

async function processQueue(){
    if (isProcessingQueue || requestQueue.length === 0) return;
    isProcessingQueue = true;
    
    const batch = requestQueue.splice(0, MAX_CONCURRENT_REQUESTS);
    
    await Promise.all(batch.map(async (item) => {
        try{
            const result = await item.fn();
            item.resolve(result);
        }catch(err){
            item.reject(err);
        }
    }));
    
    if (requestQueue.length > 0){
        await new Promise(r => setTimeout(r, REQUEST_DELAY));
    }
    
    isProcessingQueue = false;
    if (requestQueue.length > 0){
        processQueue();
    }
}

function calculateRSI(closes, period = 14){
    if (!closes || closes.length < period + 1) return null;
    
    let prevAvgGain = 0;
    let prevAvgLoss = 0;
    
    for (let i = 1; i <= period; i++){
        const change = closes[i] - closes[i - 1];
        if (change > 0) prevAvgGain += change;
        else prevAvgLoss += Math.abs(change);
    }
    
    prevAvgGain = prevAvgGain / period;
    prevAvgLoss = prevAvgLoss / period;
    
    for (let i = period + 1; i < closes.length; i++){
        const change = closes[i] - closes[i - 1];
        const gain = change > 0 ? change : 0;
        const loss = change < 0 ? Math.abs(change) : 0;
        
        prevAvgGain = (prevAvgGain * (period - 1) + gain) / period;
        prevAvgLoss = (prevAvgLoss * (period - 1) + loss) / period;
    }
    
    if (prevAvgLoss === 0) return 100;
    const rs = prevAvgGain / prevAvgLoss;
    return 100 - (100 / (1 + rs));
}

async function fetchRsiForSymbol(symbol, interval){
    return queueRequest(async () => {
        const symbolMap = SYMBOL_MAP[symbol] || { twelvedata: symbol, twelvedataAlt: [], proxy: symbol };
        const intervalMap = INTERVAL_MAP[interval] || interval;
        
        for (let attempt = 0; attempt < RSI_API_SOURCES.length; attempt++){
            const apiSource = getNextApiKey();
            
            if (apiSource.type === "proxy"){
                try{
                    const proxyUrl = DATA_SOURCE.proxyUrl;
                    const url = `${proxyUrl}?endpoint=rsi&symbol=${symbolMap.proxy}&interval=${intervalMap}`;
                    const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
                    const data = await res.json();
                    
                    if (data.status === "ok" && data.rsi != null){
                        markApiSuccess(apiSource.name);
                        return { rsi: data.rsi, time: data.time || new Date().toISOString() };
                    }
                    
                    console.warn(`Proxy RSI error for ${symbol}:`, data.message);
                    markApiFailure(apiSource.name);
                }catch(err){
                    markApiFailure(apiSource.name);
                    console.error(`Proxy RSI fetch error for ${symbol}:`, err.message);
                }
            }
            
            if (apiSource.type === "twelvedata"){
                const symbolsToTry = [symbolMap.twelvedata, ...(symbolMap.twelvedataAlt || [])];
                
                for (const twelvedataSymbol of symbolsToTry){
                    try{
                        const url = `https://api.twelvedata.com/time_series?symbol=${twelvedataSymbol}&interval=${intervalMap}&outputsize=50&apikey=${apiSource.apiKey}`;
                        const res = await fetch(url, { signal: AbortSignal.timeout(15000) });
                        const data = await res.json();
                        
                        if (data.status === "error"){
                            console.warn(`TwelveData error for ${symbol} (${twelvedataSymbol}):`, data.message);
                            continue;
                        }
                        
                        if (!data || !data.values || data.values.length < 15){
                            console.warn(`TwelveData insufficient data for ${symbol} (${twelvedataSymbol})`);
                            continue;
                        }
                        
                        markApiSuccess(apiSource.name);
                        const closes = data.values.map(v => parseFloat(v.close)).reverse();
                        const rsi = calculateRSI(closes);
                        const lastTime = data.values[0].datetime;
                        return { rsi, time: lastTime };
                    }catch(err){
                        console.error(`RSI fetch error for ${symbol} ${interval}:`, err.message);
                    }
                }
                
                markApiFailure(apiSource.name);
            }
        }
        
        return null;
    });
}

function normalizeRsiSymbol(input){

    const compact = raw.replace(/\s+/g, "");
    const aliases = {
        "BRENT": "BRENT",
        "UKOIL": "UKOIL",
        "BRN": "BRENT",
        "BZ": "BRENT",
        "BZ=F": "BRENT",
        "GOLD": "XAUUSD",

        "GC": "XAUUSD",
        "GC=F": "XAUUSD",
        "WTI": "USOIL",
        "CL": "USOIL",
        "CL=F": "USOIL"
    };
    return aliases[compact] || compact;
}

async function fetchRsiForCustomSymbol(symbolId){
    const symbol = RSI_MONITOR_CONFIG.symbols.find(s => s.id === symbolId);

    const symbolData = {};
    let lastUpdateTime = null;
    
    for (const tf of RSI_MONITOR_CONFIG.timeframes){

    }
    
    rsiMonitorData[symbol.id] = symbolData;

function updateRsiDisplay(symbolId, tfId, rsi){
    const el = document.getElementById(`${symbolId}-${tfId}`);
    if (!el) return;
    
    el.textContent = rsi != null ? rsi.toFixed(1) : "--";
    el.classList.remove("oversold", "overbought", "neutral");
    
    if (rsi != null){
        if (rsi <= RSI_MONITOR_CONFIG.oversoldThreshold){
            el.classList.add("oversold");
            // 只监控BTCUSD的1小时RSI
            if (tfId === "1h" && symbolId === "btcusd") {
                sendRsiEmailAlert(symbolId, "超卖", rsi, "1小时");
            }
        } else if (rsi >= RSI_MONITOR_CONFIG.overboughtThreshold){
            el.classList.add("overbought");
            // 只监控BTCUSD的1小时RSI
            if (tfId === "1h" && symbolId === "btcusd") {
                sendRsiEmailAlert(symbolId, "超买", rsi, "1小时");
            }
        } else {
            el.classList.add("neutral");
        }
    }
}

async function sendRsiEmailAlert(symbolId, type, rsiValue, timeframe) {
    // 检查时间：只在白天7点到晚上12点监控
    const now = new Date();
    const utcHour = now.getUTCHours();
    const beijingHour = (utcHour + 8) % 24; // 转换为北京时间（UTC+8）
    
    // 如果不在7:00-24:00之间，不发送邮件
    if (beijingHour < 7) {
        console.log(`监控时间已过，当前为非监控时段（北京时间${beijingHour}:00）`);
        return;
    }
    
    // 检查是否已发送过提醒（避免重复发送）
    const alertKey = `rsi_alert_${symbolId}_1h_${type}`;
    const lastAlert = localStorage.getItem(alertKey);
    const timestamp = Date.now();

    // 如果1小时内已发送过相同类型的提醒，则不再发送
    if (lastAlert && (timestamp - parseInt(lastAlert)) < 3600000) {
        return;
    }

    // 获取邮件配置
    const emailConfig = JSON.parse(localStorage.getItem('rsi_email_config') || '{}');
    if (!emailConfig.enabled || !emailConfig.address) {
        console.log('RSI邮件提醒未配置或未启用');
        return;
    }

    // 获取所有品种的所有周期RSI值
    const allSymbols = ['btcusd', 'ukoil', 'xauusd'];
    const symbolNames = { btcusd: "BTCUSD", ukoil: "UKOIL", xauusd: "XAUUSD" };
    const tfLabels = {
        '30m': '30分钟',
        '1h': '1小时',
        '4h': '4小时',
        '1d': '日线',
        '1w': '周线',
        '1M': '月线'
    };

    let allDataMessage = '';
    for (const symId of allSymbols) {
        const symName = symbolNames[symId];
        const symValues = [];

        for (const tfId of ['30m', '1h', '4h', '1d', '1w', '1M']) {
            const el = document.getElementById(`${symId}-${tfId}`);
            if (el && el.textContent !== '--') {
                const value = parseFloat(el.textContent);
                if (!isNaN(value)) {
                    symValues.push(`${tfLabels[tfId]}: ${value.toFixed(1)}`);
                }
            }
        }

        if (symValues.length > 0) {
            allDataMessage += `【${symName}】\n${symValues.join('\n')}\n\n`;
        }
    }

    const subject = `${type}提醒 - BTCUSD`;
    const message = `BTCUSD ${timeframe} ${type}：当前为 ${rsiValue.toFixed(1)}，已触及阈值！

${allDataMessage}时间：${new Date().toLocaleString('zh-CN')}`;

    try {
        // 调用Worker发送邮件
        const response = await fetch('https://hg-macro-fred.wubairan.workers.dev/?endpoint=send-email', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                to: emailConfig.address,
                subject: subject,
                body: message
            })
        });

        const result = await response.json();

        if (result.success) {
            console.log(`RSI邮件提醒已发送：${subject}`);
            // 记录已发送，避免重复
            localStorage.setItem(alertKey, timestamp.toString());

            // 显示通知
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(subject, { body: message });
            }
        } else {
            console.error('RSI邮件提醒发送失败:', result.error || result.message);
        }
    } catch (error) {
        console.error('RSI邮件提醒发送失败:', error);
    }
}

function checkRsiResonance(symbolId, data){
    const alertEl = document.getElementById(`${symbolId}-alert`);
    if (!alertEl) return;
    
    alertEl.className = "alert-badge";
    alertEl.textContent = "";
    
    const values = Object.values(data).filter(v => v != null);
    if (values.length === 0) return;
    
    const oversoldCount = values.filter(v => v <= RSI_MONITOR_CONFIG.oversoldThreshold).length;
    const overboughtCount = values.filter(v => v >= RSI_MONITOR_CONFIG.overboughtThreshold).length;
    
    if (oversoldCount >= RSI_MONITOR_CONFIG.resonanceCount){
        alertEl.classList.add("resonance");
        alertEl.textContent = `超卖共振(${oversoldCount})`;
        showRsiAlert(symbolId, "超卖共振", oversoldCount);
    } else if (overboughtCount >= RSI_MONITOR_CONFIG.resonanceCount){
        alertEl.classList.add("resonance");
        alertEl.textContent = `超买共振(${overboughtCount})`;
        showRsiAlert(symbolId, "超买共振", overboughtCount);
    } else if (oversoldCount > 0){
        alertEl.classList.add("oversold");
        alertEl.textContent = `超卖(${oversoldCount})`;
    } else if (overboughtCount > 0){
        alertEl.classList.add("overbought");
        alertEl.textContent = `超买(${overboughtCount})`;
    }
}
