*{

body{

body.draw-mode{

body.chart-collapsed{

.main{

}

.quote-click{
    position:absolute;
    inset:0;
    cursor:pointer;
    z-index:3;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#chart-wrap{
    flex:1;
    width:100%;
    position:relative;
    touch-action: none;
    overscroll-behavior: contain;
}
#stock-chart-container{
    width:100%;
    height:100%;
    position:relative;
    z-index:1;
    touch-action: none;
    overscroll-behavior: contain;
}
#stock-chart-container iframe{
    position:relative;
    z-index:1;
    touch-action: none;
    overscroll-behavior: contain;
}

#cycle-bar{

    bottom:36px;

    z-index:10;

.cycle-btn{

    border-radius:6px;
    cursor:pointer;
    user-select:none;
}
.cycle-btn:hover{background:#dbeafe;}
.cycle-btn.active{background:#dbeafe;color:#1e40af;font-weight:bold;}

#macroLight{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#3b82f6;
    color:#fff;
}

#macroAdvice{

    border-radius:6px;
    font-size:12px;
    background:#e0f2fe;
    color:#000;

#macroMeta{

#manualPanel{

#manualPanel .manual-title{

#alertTitle{

#alertList .alert-title-cn{

.alert-meta{

.macro-tag-row{

#macroPanel .macro-layout{

<script>
let widget;
let currentSymbol = "UKOIL";
let currentInterval = "D";
let currentRange = null;
let quoteObserver = null;
const MANUAL_KEY = "macro_manual_overrides";

const DATA_SOURCE = {
    provider: "twelvedata",
    useProxy: true,
    proxyUrl: "https://hg-inve3.wubairan.workers.dev",
    apiKey: "9739029be2174a14a23485c91380abe3"
};

function getManualOverrides(){
    try{
        const raw = localStorage.getItem(MANUAL_KEY);
        if (!raw) return {};
        const obj = JSON.parse(raw);
        return obj && typeof obj === "object" ? obj : {};
    }catch{
        return {};
    }
}

function setManualOverrides(obj){
    localStorage.setItem(MANUAL_KEY, JSON.stringify(obj));
}

function applyManualOverrides(){
    const fields = {
        gold: "manual-gold",
        vix: "manual-vix",
        hy: "BAMLH0A0HYM2",
        t5y5y: "manual-t5y5y",
        real10y: "manual-real10y",
        yieldCurve: "manual-yieldcurve"
    };
    const data = {};
    Object.keys(fields).forEach(key => {
        const el = document.getElementById(fields[key]);
        if (!el) return;
        const v = parseFloat(el.value);
        if (Number.isFinite(v)) data[key] = v;
    });
    setManualOverrides(data);
    macroCheck();
}

function clearManualOverrides(){
    localStorage.removeItem(MANUAL_KEY);
    ["manual-gold","manual-vix","BAMLH0A0HYM2","manual-t5y5y","manual-real10y","manual-yieldcurve"].forEach(id=>{
        const el = document.getElementById(id);
        if (el) el.value = "";
    });
    macroCheck();
}

function applyManualToData(data){
    const manual = getManualOverrides();
    let used = false;
    if (manual.gold != null && (data.gold == null)) { data.gold = manual.gold; used = true; }
    if (manual.vix != null && (data.vix == null)) { data.vix = manual.vix; used = true; }
    if (manual.hy != null && (data.hy == null)) { data.hy = manual.hy; used = true; }
    if (manual.t5y5y != null && (data.t5y5y == null)) { data.t5y5y = manual.t5y5y; used = true; }
    if (manual.real10y != null && (data.real10y == null)) { data.real10y = manual.real10y; used = true; }
    if (manual.yieldCurve != null && (data.yieldCurve == null)) { data.yieldCurve = manual.yieldCurve; used = true; }
    if (used) data.__manualUsed = true;
    return data;
}

function fillManualInputs(){
    const manual = getManualOverrides();
    const map = {
        gold: "manual-gold",
        vix: "manual-vix",
        hy: "BAMLH0A0HYM2",
        t5y5y: "manual-t5y5y",

        const el = document.getElementById(map[key]);

}

const MACRO_THRESHOLDS = {

function appendSingleQuoteWidget(container, symbol){
    const script = document.createElement("script");
    script.type = "text/javascript";
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
        symbol: tvSymbolMap[symbol] || symbol,
        width: "100%",
        colorTheme: "light",
        isTransparent: true,
        locale: "zh_CN",
        showSymbolLogo: false,
        fontSize: "1"
    });
    container.appendChild(script);
}

function renderQuoteGrid(){
    const grid = document.getElementById("quote-grid");
    grid.innerHTML = "";

    quickSymbols.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "quote-tile";
        const label = document.createElement("div");
        label.className = "quote-label";
        label.textContent = item.label;

        let widgetWrap;
        if (item.type === "manual"){
            widgetWrap = document.createElement("div");
            widgetWrap.className = "manual-quote";
            widgetWrap.style.flex = "1";
            widgetWrap.style.display = "flex";
            widgetWrap.style.alignItems = "center";
            widgetWrap.style.justifyContent = "flex-end";
            widgetWrap.style.fontSize = "12px";
            widgetWrap.style.color = "#111827";
            widgetWrap.dataset.symbol = item.symbol;
            if (item.displaySymbol){
                widgetWrap.dataset.displaySymbol = item.displaySymbol;
            }
            widgetWrap.textContent = "--";
        } else {
            widgetWrap = document.createElement("div");
            widgetWrap.className = "tradingview-widget-container";
            widgetWrap.style.height = "100%";
            widgetWrap.style.flex = "1";

            const widgetTarget = document.createElement("div");
            widgetTarget.className = "tradingview-widget-container__widget";
            widgetTarget.style.height = "100%";

            widgetWrap.appendChild(widgetTarget);
            widgetWrap.dataset.symbol = item.symbol;
            widgetWrap.classList.add("lazy-quote");
        }

        const click = document.createElement("div");
        click.className = "quote-click";
        click.onclick = () => {
            if (item.type === "manual") return;
            loadChart(item.symbol);
        };

        tile.appendChild(label);
        tile.appendChild(widgetWrap);
        tile.appendChild(click);
        grid.appendChild(tile);
    });
}

function initQuoteObserver(){
    const lazyQuotes = Array.from(document.querySelectorAll(".lazy-quote"));
    if (!("IntersectionObserver" in window)){
        lazyQuotes.forEach(el => {
            if (!el.dataset.loaded){
                const sym = el.dataset.displaySymbol || el.dataset.symbol;
                appendSingleQuoteWidget(el, sym);
                el.dataset.loaded = "1";
            }
        });
        return;
    }
    if (quoteObserver) quoteObserver.disconnect();
    quoteObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting){
                const el = entry.target;
                if (!el.dataset.loaded){
                    const sym = el.dataset.displaySymbol || el.dataset.symbol;
                    appendSingleQuoteWidget(el, sym);
                    el.dataset.loaded = "1";
                }
                quoteObserver.unobserve(el);
            }
        });
    }, { root: null, rootMargin: "100px", threshold: 0.1 });

    lazyQuotes.forEach(el => quoteObserver.observe(el));
}

function updateManualQuotes(data){
    const map = {
        "MANUAL:T5Y5Y": data && data.t5y5y != null ? data.t5y5y : null
    };
    const nodes = Array.from(document.querySelectorAll(".manual-quote"));
    nodes.forEach(node => {
        const key = node.dataset.symbol;
        const val = map[key];
        node.textContent = (val != null && Number.isFinite(val)) ? val.toFixed(2) : "--";
    });
}

function loadChart(symbol){
    document.getElementById('stock-search').value = symbol;
    updateStockChart(symbol);
}

function updateStockChart(symbolInput){

    const symbol = symbolInput ||
                   document.getElementById('stock-search').value ||
                   "XAUUSD/UKOIL";
    currentSymbol = symbol;

    document.getElementById('stock-chart-container').innerHTML = '';

    widget = new TradingView.widget({
        autosize:true,
        symbol: tvSymbolMap[symbol] || symbol,
        interval: currentInterval,
        range: currentRange || undefined,
        timezone:"Etc/UTC",
        theme:"light",
        style:"1",
        locale:"zh_CN",

        toolbar_bg:"#f1f3f6",
        enable_publishing:false,

        hide_top_toolbar:false,
        hide_side_toolbar:false,
        hide_legend:false,

        save_image:true,

        container_id:"stock-chart-container",
        studies:["RSI@tv-basicstudies"]
    });
}

function highlightButton(btn){
    document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function setCycle(cycle, btn){
    currentInterval = cycle;
    currentRange = null;
    updateStockChart(currentSymbol);
    highlightButton(btn);
}

function setRange(type, btn){
    if (type === "ytd") currentRange = "YTD";
    if (type === "12m") currentRange = "12M";
    if (type === "60m") currentRange = "60M";
    if (type === "all") currentRange = "ALL";
    updateStockChart(currentSymbol);
    highlightButton(btn);
}

function buildStrategy(stage, ctx){
    const copperLine = ctx.copperTrend === "上升"
        ? "铜油比上升 → 工业需求增强"
        : ctx.copperTrend === "下降"
            ? "铜油比下降 → 工业需求走弱"

function buildOilStressModule(oilStress, oilDate, brentDate, brentFut, brentFutDate){
    if (!oilStress || oilStress.level == null){
        return `<div><strong>能源压力等级：</strong>N/A</div>`;
    }
    const level = oilStress.level;
    const brent = oilStress.brent != null ? oilStress.brent.toFixed(2) : "N/A";
    const wti = oilStress.wti != null ? oilStress.wti.toFixed(2) : "N/A";
    const spread = oilStress.spread != null ? oilStress.spread.toFixed(2) : "N/A";
    const days = oilStress.brentAbove115Days != null ? oilStress.brentAbove115Days : "N/A";
    const wtiT90 = (oilStress.spread != null) ? (90 - oilStress.spread).toFixed(2) : "N/A";
    const wtiT100 = (oilStress.spread != null) ? (100 - oilStress.spread).toFixed(2) : "N/A";
    const wtiT115 = (oilStress.spread != null) ? (115 - oilStress.spread).toFixed(2) : "N/A";

    let explain = "油价中性，通胀压力有限。";
    if (level === 1) explain = "油价进入通胀压力区，能源成本推高CPI。";
    if (level === 2) explain = "油价进入增长压制区，企业利润承压。";
    if (level === 3) explain = "油价进入需求破坏区，滞胀风险上升。";

    return `
        <div><strong>能源压力等级：</strong>${level}</div>
        <div>Brent（EIA spot）：${brent}${brentDate ? `（${brentDate}）` : ""}｜WTI：${wti}${oilDate ? `（${oilDate}）` : ""}｜Spread：${spread}</div>
        <div style="font-size:11px;color:#6b7280;">提示：Brent=全球基准油价（宏观），WTI=交易参考（盘面）。</div>
        <div>WTI阈值估算：90→${wtiT90} / 100→${wtiT100} / 115→${wtiT115}</div>
        <div style="font-size:11px;color:#6b7280;">
            含义：当 WTI≥${wtiT90}，相当于 Brent≈90（通胀压力区）；<br>
            当 WTI≥${wtiT100}，相当于 Brent≈100（增长压制区）；<br>
            当 WTI≥${wtiT115}，相当于 Brent≈115（需求破坏风险区）
        </div>
        <div style="font-size:11px;color:#6b7280;">

        <div>Brent≥115天数：${days}</div>
        <div>${explain}</div>

}

function buildEventImpact(){
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const newsText = newsAlerts.map(a => typeof a === "string" ? a : (a.title || "")).join(" ");
    const marketText = marketAlerts.join(" ");
    const text = (newsText + " " + marketText).toLowerCase();

    const hasWar = text.includes("war") || text.includes("战争") || text.includes("冲突") || text.includes("iran") || text.includes("中东");
    const hasOilShock = text.includes("oil") || text.includes("油价") || text.includes("能源");
    const hasRate = text.includes("rate") || text.includes("加息") || text.includes("hike");

    const lines = [];
    if (hasWar || hasOilShock){
        lines.push("地缘/能源扰动 → 短期利好能源与黄金，利空航空/高耗能行业");
    }
    if (hasRate){
        lines.push("利率收紧 → 成长股承压，现金与短债相对占优");
    }
    if (!lines.length){
        lines.push("暂无显著事件冲击信号");
    }

    return `<div><strong>事件影响：</strong>${lines.join("；")}</div>`;
}

function getEventScore(){
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const newsText = newsAlerts.map(a => typeof a === "string" ? a : (a.title || "")).join(" ");
    const marketText = marketAlerts.join(" ");
    const text = (newsText + " " + marketText).toLowerCase();

    const hasWar = text.includes("war") || text.includes("战争") || text.includes("冲突") || text.includes("iran") || text.includes("中东");
    const hasOilShock = text.includes("oil") || text.includes("油价") || text.includes("能源");
    const hasRate = text.includes("rate") || text.includes("加息") || text.includes("hike");

    let eventScore = 0;
    if (hasWar) eventScore -= 1;
    if (hasOilShock) eventScore -= 1;
    if (hasRate) eventScore -= 1;
    return eventScore;
}

function trendLabel(current, ma){
    if (current == null || ma == null || !Number.isFinite(current) || !Number.isFinite(ma)) return "N/A";
    const diff = (current - ma) / ma;
    if (diff > 0.01) return "上升";
    if (diff < -0.01) return "下降";
    return "持平";
}

async function fetchAlerts(){
    const listEl = document.getElementById("alertList");
    listEl.textContent = "正在获取预警...";
    try{
        const res = await fetch(`${DATA_SOURCE.proxyUrl}?endpoint=alerts`);
        const data = await res.json();
        if (!data || data.status !== "ok"){
            listEl.textContent = data && data.message ? data.message : "预警数据不可用";
            return;
        }

        const translateNewsTitle = (title) => {
            if (!title) return "";
            let t = title;
            const map = [
                [/war|conflict|clash|tensions/ig, "战争/冲突"],
                [/oil|crude|energy/ig, "油价/能源"],
                [/inflation/ig, "通胀"],
                [/rate hike|rates|yields|bond/ig, "利率/收益率"],
                [/stocks|equities|shares|index/ig, "股市/指数"],
                [/gold/ig, "黄金"],
                [/dollar|usd|dxy/ig, "美元/美元指数"],
                [/recession/ig, "衰退"],
                [/risk/ig, "风险"]
            ];
            const original = t;
            map.forEach(([re, cn]) => {
                t = t.replace(re, cn);
            });
            if (t === original) return "（无直译，保留英文原文）";
            return t;
        };

        const translateMarketAlert = (text) => {
            if (!text) return "";
            const m = text.match(/油价24h上涨([0-9.]+)%/);
            if (m) return `Oil +${m[1]}% in 24h → energy shock risk`;
            return "Market alert";
        };

        const marketItems = (data.marketAlerts || []).map(a => {
            const en = translateMarketAlert(a);
            return `
                <li>
                    <span class="alert-tag">市场</span>
                    <div class="alert-title-cn">CN: ${a}</div>
                    <div class="alert-title-en">EN: ${en}</div>
                </li>`;
        }).join("");

        const newsItems = (data.newsAlerts || []).map(a => {
            if (typeof a === "string"){
                const cn = translateNewsTitle(a);
                return `
                    <li>
                        <span class="alert-tag">事件</span>
                        <div class="alert-title-en">EN: ${a}</div>
                        <div class="alert-title-cn">CN: ${cn}</div>
                    </li>`;
            }
            const title = a.title || "";
            const translated = a.translated || "";
            const link = a.link || "";
            const tag = a.tag || "事件";
            const safeLink = link ? `<a href="${link}" target="_blank" rel="noopener">来源</a>` : "";
            const cn = translated || translateNewsTitle(title);
            return `
                <li>
                    <span class="alert-tag">${tag}</span>
                    <div class="alert-title-en">EN: ${title} ${safeLink}</div>
                    <div class="alert-title-cn">CN: ${cn}</div>
                </li>`;
        }).join("");

        const marketBlock = marketItems
            ? `<div><strong>市场异常</strong><ul>${marketItems}</ul></div>`
            : `<div><strong>市场异常</strong><div>无</div></div>`;

        const newsBlock = newsItems
            ? `<div style="margin-top:6px;"><strong>宏观事件</strong><ul>${newsItems}</ul></div>`
            : `<div style="margin-top:6px;"><strong>宏观事件</strong><div>无</div></div>`;

        const summary = data.summary ? `<div class="alert-meta">${data.summary}</div>` : "";

        listEl.innerHTML = `${marketBlock}${newsBlock}${summary}`;
        window.__alertData = data;
    }catch(err){
        listEl.textContent = "预警数据获取失败";
    }
}

function initMacroToggleButton(){
    const btn = document.getElementById("macroToggleBtn");
    if (!btn) return;
    let touchMoved = false;
    let startX = 0;
    let startY = 0;
    let lastTouchToggle = 0;

    btn.addEventListener("touchstart", (e) => {
        const t = e.touches && e.touches[0];
        if (!t) return;
        touchMoved = false;
        startX = t.clientX;
        startY = t.clientY;
    }, { passive: true });

    btn.addEventListener("touchmove", (e) => {
        const t = e.touches && e.touches[0];
        if (!t) return;
        const dx = Math.abs(t.clientX - startX);
        const dy = Math.abs(t.clientY - startY);
        if (dx > 6 || dy > 6) touchMoved = true;
    }, { passive: true });

    btn.addEventListener("touchend", (e) => {
        if (touchMoved) return;
        lastTouchToggle = Date.now();
        toggleMacroPanel(e);
    });

    btn.addEventListener("click", (e) => {
        if (Date.now() - lastTouchToggle < 500) return;
        toggleMacroPanel(e);
    });
}

async function copyMacro(){
    const light = document.getElementById("macroLight");
    const advice = document.getElementById("macroAdvice");
    const meta = document.getElementById("macroMeta");
    const alertTitle = document.getElementById("alertTitle");
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const alertLines = [];
    if (marketAlerts.length){
        alertLines.push("市场异常：");
        marketAlerts.forEach(a => alertLines.push("• " + a));
    }
    if (newsAlerts.length){
        alertLines.push("宏观事件：");
        newsAlerts.forEach(a => {
            if (typeof a === "string"){
                alertLines.push("• " + a);
            } else {
                const t = a.title || "";
                const l = a.link || "";
                const tag = a.tag || "事件";
                alertLines.push("• [" + tag + "] " + t + (l ? " (" + l + ")" : ""));
            }
        });
    }
    if (alertData.summary) alertLines.push(alertData.summary);
    const alertText = alertLines.join("\n");
    const text = [
        "宏观AI策略",
        light ? light.textContent.trim() : "",
        advice ? advice.textContent.trim() : "",
        meta ? meta.textContent.trim() : "",
        alertTitle ? alertTitle.textContent.trim() : "宏观预警",
        alertText || "无"
    ].filter(Boolean).join("\n");
    try{
        await navigator.clipboard.writeText(text);
        alert("已复制宏观AI策略");
    }catch(err){
        alert("复制失败，请检查浏览器权限");
    }
}
