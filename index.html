
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    background:#f0f3f7;
    font-family:-apple-system,sans-serif;
    height:100vh;
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:auto;
}

.main{
    flex:1;
    display:flex;
    flex-direction:column;
}

.control-panel{
    background:#fff;
    padding:10px;
    border-bottom:1px solid #eee;
    overflow:visible;
}

.action-row{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
}
.action-row button{
    white-space:nowrap;
}

.chart-grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:6px;
    margin-bottom:10px;
}

.quote-tile{
    position:relative;
    background:#f1f3f6;
    border-radius:8px;
    overflow:hidden;
    height:54px;
    display:flex;
    align-items:center;
    gap:6px;
    padding:6px 8px;
}

.quote-label{
    font-size:9px;
    color:#555;
    pointer-events:none;
    white-space:nowrap;
}

.quote-click{
    position:absolute;
    inset:0;
    cursor:pointer;
    z-index:3;
}

input{
    padding:8px;
    border-radius:6px;
    border:1px solid #ddd;
}

#chart-wrap{
    flex:1;
    width:100%;
    position:relative;
}
#stock-chart-container{
    width:100%;
    height:100%;
    position:relative;
    z-index:1;
}
#stock-chart-container iframe{
    position:relative;
    z-index:1;
}

#cycle-bar{
    position:absolute;
    left:10px;
    bottom:36px;
    display:flex;
    gap:6px;
    padding:4px 6px;
    background:rgba(255,255,255,0.9);
    border:1px solid #eee;
    border-radius:8px;
    z-index:10;
    pointer-events:auto;
}
.cycle-btn{
    padding:4px 8px;
    font-size:12px;
    background:#f3f4f6;
    border-radius:6px;
    cursor:pointer;
    user-select:none;
}
.cycle-btn:hover{background:#dbeafe;}
.cycle-btn.active{background:#dbeafe;color:#1e40af;font-weight:bold;}

#macroLight{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#3b82f6;
    color:#fff;
}

#macroAdvice{
    margin:6px 0;
    padding:6px;
    border-radius:6px;
    font-size:12px;
    background:#e0f2fe;
    color:#000;
}

#macroMeta{
    margin-top:6px;
    font-size:11px;
    color:#666;
}

#alertPanel{
    margin-top:8px;
    padding:8px;
    border-radius:8px;
    background:#fff7ed;
    border:1px solid #fed7aa;
}
#alertTitle{
    font-weight:bold;
    font-size:12px;
    color:#9a3412;
    margin-bottom:6px;
}
#alertList{
    font-size:12px;
    color:#3f3f46;
}
#alertList ul{
    margin:6px 0 0 16px;
    padding:0;
}
.alert-tag{
    display:inline-block;
    padding:2px 6px;
    border-radius:6px;
    font-size:11px;
    background:#fee2e2;
    color:#991b1b;
    margin-right:6px;
}
.alert-meta{
    font-size:11px;
    color:#6b7280;
    margin-top:6px;
}

#macroPanel{
    overflow:hidden;
    max-height:600px;
    transition:max-height 0.25s ease;
}
#macroPanel.collapsed{
    max-height:0;
}

.signal{
    display:inline-block;
    width:12px;
    height:12px;
    border-radius:50%;
    margin-right:6px;
}
.green{background:#00ff90;}
.yellow{background:#ffd000;}
.red{background:#ff4040;}

#translate-panel,
#news-panel{
    display:none;
    border-top:1px solid #eee;
    flex:1;
    min-height:70dvh;
}
#translate-panel iframe,
#news-panel iframe{
    width:100%;
    height:100dvh;
    border:0;
}

#back-to-quotes{
    position:fixed;
    right:12px;
    bottom:12px;
    z-index:20;
    background:#111827;
    color:#fff;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    font-size:12px;
    display:none;
}


@media (max-width: 1024px){
    body{
        overflow:auto;
    }
    .main{
        flex:initial;
        min-height:100dvh;
    }
    .control-panel{
        max-height:none;
        overflow:visible;
    }
    .chart-grid{
        grid-template-columns:repeat(2,1fr);
    }
    .quote-tile{
        height:60px;
        padding:6px;
    }
    .quote-label{
        font-size:11px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.8);
        transform-origin:left center;
    }
    #chart-wrap{
        min-height:70dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:70dvh;
    }
}

@media (max-width: 600px){
    .control-panel{
        max-height:none;
        overflow:visible;
    }
    .quote-tile{
        height:56px;
    }
    .quote-label{
        font-size:10px;
    }
    .quote-tile .tradingview-widget-container{
        transform:scale(0.7);
        transform-origin:left center;
    }
    #chart-wrap{
        min-height:100dvh;
        height:100dvh;
    }
    #translate-panel,
    #news-panel{
        min-height:100dvh;
        height:100dvh;
    }
}
</style>

function appendSingleQuoteWidget(container, symbol){
    const script = document.createElement("script");
    script.type = "text/javascript";
    script.src = "https://s3.tradingview.com/external-embedding/embed-widget-single-quote.js";
    script.async = true;
    script.innerHTML = JSON.stringify({
        symbol: tvSymbolMap[symbol] || symbol,
        width: "100%",
        colorTheme: "light",
        isTransparent: true,
        locale: "zh_CN",
        showSymbolLogo: false,
        fontSize: "1"
    });
    container.appendChild(script);
}

function renderQuoteGrid(){
    const grid = document.getElementById("quote-grid");
    grid.innerHTML = "";

    quickSymbols.forEach(item => {
        const tile = document.createElement("div");
        tile.className = "quote-tile";
        const label = document.createElement("div");
        label.className = "quote-label";
        label.textContent = item.label;

        const widgetWrap = document.createElement("div");
        widgetWrap.className = "tradingview-widget-container";
        widgetWrap.style.height = "100%";
        widgetWrap.style.flex = "1";

        const widgetTarget = document.createElement("div");
        widgetTarget.className = "tradingview-widget-container__widget";
        widgetTarget.style.height = "100%";

        widgetWrap.appendChild(widgetTarget);
        widgetWrap.dataset.symbol = item.symbol;
        widgetWrap.classList.add("lazy-quote");

        const click = document.createElement("div");
        click.className = "quote-click";
        click.onclick = () => loadChart(item.symbol);

        tile.appendChild(label);
        tile.appendChild(widgetWrap);
        tile.appendChild(click);
        grid.appendChild(tile);
    });
}

function initQuoteObserver(){
    const lazyQuotes = Array.from(document.querySelectorAll(".lazy-quote"));
    if (!("IntersectionObserver" in window)){
        lazyQuotes.forEach(el => {
            if (!el.dataset.loaded){
                appendSingleQuoteWidget(el, el.dataset.symbol);
                el.dataset.loaded = "1";
            }
        });
        return;
    }
    if (quoteObserver) quoteObserver.disconnect();
    quoteObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting){
                const el = entry.target;
                if (!el.dataset.loaded){
                    appendSingleQuoteWidget(el, el.dataset.symbol);
                    el.dataset.loaded = "1";
                }
                quoteObserver.unobserve(el);
            }
        });
    }, { root: null, rootMargin: "100px", threshold: 0.1 });

    lazyQuotes.forEach(el => quoteObserver.observe(el));
}

function loadChart(symbol){
    document.getElementById('stock-search').value = symbol;
    updateStockChart(symbol);
}

function updateStockChart(symbolInput){

    const symbol = symbolInput ||
                   document.getElementById('stock-search').value ||
                   "XAUUSD/UKOIL";
    currentSymbol = symbol;

    document.getElementById('stock-chart-container').innerHTML = '';

    widget = new TradingView.widget({
        autosize:true,
        symbol: tvSymbolMap[symbol] || symbol,
        interval: currentInterval,
        range: currentRange || undefined,
        timezone:"Etc/UTC",
        theme:"light",
        style:"1",
        locale:"zh_CN",

        toolbar_bg:"#f1f3f6",
        enable_publishing:false,

        hide_top_toolbar:false,
        hide_side_toolbar:false,
        hide_legend:false,

        save_image:true,

        container_id:"stock-chart-container",
        studies:["RSI@tv-basicstudies"]
    });
}

function highlightButton(btn){
    document.querySelectorAll('.cycle-btn').forEach(b => b.classList.remove('active'));
    if (btn) btn.classList.add('active');
}

function setCycle(cycle, btn){
    currentInterval = cycle;
    currentRange = null;
    updateStockChart(currentSymbol);
    highlightButton(btn);
}

function setRange(type, btn){
    if (type === "ytd") currentRange = "YTD";
    if (type === "12m") currentRange = "12M";
    if (type === "60m") currentRange = "60M";
    if (type === "all") currentRange = "ALL";
    updateStockChart(currentSymbol);
    highlightButton(btn);
}

function buildStrategy(stage, ctx){
    const copperLine = ctx.copperTrend === "上升"
        ? "铜油比上升 → 工业需求增强"
        : ctx.copperTrend === "下降"
            ? "铜油比下降 → 工业需求走弱"
            : "铜油比持平 → 需求信号不明";

    const stockLine = ctx.stockTrend === "上升"
        ? "股油比上升 → 企业利润改善"
        : ctx.stockTrend === "下降"
            ? "股油比下降 → 企业利润压力增加"
            : "股油比持平 → 利润信号不明";

    const goldLine = ctx.goldTrend === "上升"
        ? "金油比上升 → 避险/通胀压力"
        : ctx.goldTrend === "下降"
            ? "金油比下降 → 风险偏好改善"
            : "金油比持平 → 风险信号不明";

    const vixLine = ctx.vix == null
        ? "VIX 无数据"
        : ctx.vix > 35
            ? "VIX 高位 → 恐慌阶段"
            : ctx.vix > 25
                ? "VIX 上升 → 风险情绪偏高"
                : "VIX 稳定 → 风险情绪温和";

    const hyLine = ctx.hy == null
        ? "HY 利差无数据"
        : ctx.hy > 7
            ? "HY 利差高位 → 金融风险上升"
            : ctx.hy > 5
                ? "HY 利差扩大 → 信用压力增加"
                : "HY 利差稳定 → 金融压力有限";

    if (stage === "复苏"){
        return `
            <div>${copperLine}</div>
            <div>${stockLine}</div>
            <div>${goldLine}</div>
            <div>${vixLine}</div>
            <div>${hyLine}</div>
            <div>交易建议：</div>
            <ul>
                <li>做多：SP500、NASDAQ、工业金属、小盘股</li>
                <li>做空：黄金、美元</li>
            </ul>
            <div>建议组合：</div>
            <ul>
                <li>股票 70%</li>
                <li>商品 20%</li>
                <li>现金 10%</li>
            </ul>`;
    }
    if (stage === "扩张"){
        return `
            <div>${copperLine}</div>
            <div>${stockLine}</div>
            <div>${goldLine}</div>
            <div>${vixLine}</div>
            <div>${hyLine}</div>
            <div>交易建议：</div>
            <ul>
                <li>做多：科技股、周期股、铜、新兴市场</li>
                <li>减持：债券、黄金</li>
            </ul>
            <div>建议组合：</div>
            <ul>
                <li>股票 80%</li>
                <li>商品 10%</li>
                <li>现金 10%</li>
            </ul>`;
    }
    if (stage === "扩张后期"){
        return `
            <div>${copperLine}</div>
            <div>${stockLine}</div>
            <div>${goldLine}</div>
            <div>${vixLine}</div>
            <div>${hyLine}</div>
            <div>交易建议：</div>
            <ul>
                <li>做多：能源、价值股、黄金</li>
                <li>减少：成长股、小盘股</li>
            </ul>
            <div>建议组合：</div>
            <ul>
                <li>股票 50%</li>
                <li>能源 20%</li>
                <li>黄金 20%</li>
                <li>现金 10%</li>
            </ul>`;
    }
    if (stage === "滞胀"){
        return `
            <div>${copperLine}</div>
            <div>${stockLine}</div>
            <div>${goldLine}</div>
            <div>${vixLine}</div>
            <div>${hyLine}</div>
            <div>交易建议：</div>
            <ul>
                <li>做多：黄金、能源、大宗商品</li>
                <li>做空：科技股、债券</li>
            </ul>
            <div>建议组合：</div>
            <ul>
                <li>黄金 35%</li>
                <li>能源 35%</li>
                <li>股票 20%</li>
                <li>现金 10%</li>

    }
    if (stage === "衰退"){
        return `
            <div>${copperLine}</div>
            <div>${stockLine}</div>
            <div>${goldLine}</div>
            <div>${vixLine}</div>
            <div>${hyLine}</div>

            <ul>
                <li>做多：美债、黄金、美元</li>

}

function buildEventImpact(){
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const newsText = newsAlerts.map(a => typeof a === "string" ? a : (a.title || "")).join(" ");
    const marketText = marketAlerts.join(" ");
    const text = (newsText + " " + marketText).toLowerCase();

    const hasWar = text.includes("war") || text.includes("战争") || text.includes("冲突") || text.includes("iran") || text.includes("中东");
    const hasOilShock = text.includes("oil") || text.includes("油价") || text.includes("能源");
    const hasRate = text.includes("rate") || text.includes("加息") || text.includes("hike");

    const lines = [];
    if (hasWar || hasOilShock){
        lines.push("地缘/能源扰动 → 短期利好能源与黄金，利空航空/高耗能行业");
    }
    if (hasRate){
        lines.push("利率收紧 → 成长股承压，现金与短债相对占优");
    }
    if (!lines.length){
        lines.push("暂无显著事件冲击信号");
    }

    return `<div><strong>事件影响：</strong>${lines.join("；")}</div>`;
}

function buildConsistencyCheck(stage, ctx){
    const warns = [];
    if (stage === "滞胀" || stage === "衰退"){
        if (ctx.goldOilTrend !== "上升" && ctx.oilTrend !== "上升"){
            warns.push("黄金/油价未确认避险或通胀压力");
        }
    }
    if (stage === "复苏" || stage === "扩张"){
        if (ctx.copperOilTrend !== "上升" && ctx.stockOilTrend !== "上升"){
            warns.push("铜油比/股油比未确认扩张");
        }
    }
    if (!warns.length){
        return `<div><strong>一致性检查：</strong>宏观信号与市场价格一致。</div>`;
    }
    return `<div><strong>一致性检查：</strong>${warns.join("；")}。</div>`;
}

function trendLabel(current, ma){
    if (current == null || ma == null || !Number.isFinite(current) || !Number.isFinite(ma)) return "N/A";
    const diff = (current - ma) / ma;
    if (diff > 0.01) return "上升";
    if (diff < -0.01) return "下降";
    return "持平";
}

async function macroCheck(){
    const metaEl = document.getElementById("macroMeta");
    metaEl.textContent = "正在获取数据...";

    if (!DATA_SOURCE.proxyUrl){
        document.getElementById("macroLight").innerHTML = `<span class="signal red"></span>数据缺失`;
        document.getElementById("macroAdvice").innerHTML = `缺少代理地址，请设置 Worker URL。`;
        metaEl.textContent = `更新时间：${new Date().toLocaleString()}`;
        return;
    }

    const res = await fetch(`${DATA_SOURCE.proxyUrl}?endpoint=macro`);
    const data = await res.json();
    if (!data || data.status !== "ok"){
        document.getElementById("macroLight").innerHTML = `<span class="signal red"></span>数据缺失`;
        document.getElementById("macroAdvice").innerHTML = data && data.message ? data.message : `请检查代理或数据源。`;
        metaEl.textContent = `更新时间：${new Date().toLocaleString()}`;
        return;
    }

    const {
        gold, oil, copper, us10y, dxy, btc, sp500,
        dxyPrev, us10yPrev, sp500Prev,
        vix, vixPrev, hy, hyPrev,
        ma90
    } = data;

    const copperLb = copper / 2204.62262;
    const goldOil = gold / oil;
    const copperOil = copperLb / oil;
    const stockOil = sp500 / oil;

    const goldOilMA = ma90 && ma90.gold && ma90.oil ? (ma90.gold / ma90.oil) : null;
    const copperOilMA = ma90 && ma90.copper && ma90.oil ? ((ma90.copper / 2204.62262) / ma90.oil) : null;
    const stockOilMA = ma90 && ma90.sp500 && ma90.oil ? (ma90.sp500 / ma90.oil) : null;

    const goldOilTrend = trendLabel(goldOil, goldOilMA);
    const copperOilTrend = trendLabel(copperOil, copperOilMA);
    const stockOilTrend = trendLabel(stockOil, stockOilMA);
    const oilTrend = trendLabel(oil, ma90 && ma90.oil ? ma90.oil : null);
    const us10yTrend = trendLabel(us10y, ma90 && ma90.us10y ? ma90.us10y : null);
    const dxyTrend = trendLabel(dxy, ma90 && ma90.dxy ? ma90.dxy : null);

    const dxyDown = dxyPrev !== null ? dxy < dxyPrev : false;
    const us10yDown = us10yPrev !== null ? us10y < us10yPrev : false;
    const vixUp = vixPrev !== null ? vix > vixPrev : false;
    const hyUp = hyPrev !== null ? hy > hyPrev : false;

    let score = 0;
    if (copperOilTrend === "上升") score += 2;
    if (stockOilTrend === "上升") score += 1;
    if (goldOilTrend === "上升") score -= 1;
    if (us10yTrend === "下降" || us10yDown) score += 1;
    if (dxyTrend === "下降" || dxyDown) score += 1;
    if (vixUp) score -= 1;
    if (hyUp) score -= 1;

    let stage = "扩张后期";
    let signalClass = "yellow";

    if (score >= 4){
        stage = "复苏";
        signalClass = "green";
    } else if (score >= 2){
        stage = "扩张";
        signalClass = "green";
    } else if (score >= 0){
        stage = "扩张后期";
        signalClass = "yellow";
    } else if (score >= -2){
        stage = "滞胀";
        signalClass = "yellow";
    } else {
        stage = "衰退";
        signalClass = "red";
    }

    document.getElementById("macroLight").innerHTML = `<span class="signal ${signalClass}"></span>${stage}（评分 ${score}）`;
    document.getElementById("macroAdvice").innerHTML = `
        <div><strong>宏观状态：</strong>${stage}</div>
        <div><strong>关键指标：</strong></div>
        <ul>
            <li>金油比：${goldOil.toFixed(2)}</li>
            <li>铜油比：${copperOil.toFixed(3)}</li>
            <li>股油比：${stockOil.toFixed(2)}</li>
            <li>10Y：${us10y.toFixed(2)}</li>
            <li>DXY (Trade-Weighted)：${dxy.toFixed(2)}</li>
            <li>BTC：${btc ? btc.toFixed(2) : "N/A"}</li>
            <li>SP500：${sp500 ? sp500.toFixed(2) : "N/A"}</li>
            <li>VIX：${vix ? vix.toFixed(2) : "N/A"}</li>
            <li>HY利差：${hy ? hy.toFixed(2) : "N/A"}</li>
        </ul>
        <div><strong>90日趋势：</strong></div>
        <ul>
            <li>金油比：${goldOilTrend}（MA90 ${goldOilMA ? goldOilMA.toFixed(2) : "N/A"}）</li>
            <li>铜油比：${copperOilTrend}（MA90 ${copperOilMA ? copperOilMA.toFixed(3) : "N/A"}）</li>
            <li>股油比：${stockOilTrend}（MA90 ${stockOilMA ? stockOilMA.toFixed(2) : "N/A"}）</li>
            <li>10Y：${us10yTrend}（MA90 ${ma90 && ma90.us10y ? ma90.us10y.toFixed(2) : "N/A"}）</li>
            <li>DXY：${dxyTrend}（MA90 ${ma90 && ma90.dxy ? ma90.dxy.toFixed(2) : "N/A"}）</li>
        </ul>
        <div><strong>AI策略提示：</strong></div>
        ${buildStrategy(stage, {
            goldTrend: goldOilTrend,
            copperTrend: copperOilTrend,
            stockTrend: stockOilTrend,
            vix: vix,
            hy: hy
        })}
        ${buildEventImpact()}
        ${buildConsistencyCheck(stage, {
            goldOilTrend,
            copperOilTrend,
            stockOilTrend,
            oilTrend
        })}
        <div style="margin-top:8px;font-size:11px;color:#555;">
            数据口径：铜 USD/ton → USD/lb；油 USD/barrel；DXY 为贸易加权指数（FRED）。
        </div>
    `;

    metaEl.textContent = `更新时间：${new Date().toLocaleString()}`;
}

async function fetchAlerts(){
    const listEl = document.getElementById("alertList");
    listEl.textContent = "正在获取预警...";
    try{
        const res = await fetch(`${DATA_SOURCE.proxyUrl}?endpoint=alerts`);
        const data = await res.json();
        if (!data || data.status !== "ok"){
            listEl.textContent = data && data.message ? data.message : "预警数据不可用";
            return;
        }

        const marketItems = (data.marketAlerts || []).map(a =>
            `<li><span class="alert-tag">市场</span>${a}</li>`
        ).join("");

        const newsItems = (data.newsAlerts || []).map(a => {
            if (typeof a === "string"){
                return `<li><span class="alert-tag">事件</span>${a}</li>`;
            }
            const title = a.title || "";
            const link = a.link || "";
            const tag = a.tag || "事件";
            const safeLink = link ? `<a href="${link}" target="_blank" rel="noopener">来源</a>` : "";
            return `<li><span class="alert-tag">${tag}</span>${title} ${safeLink}</li>`;
        }).join("");

        const marketBlock = marketItems
            ? `<div><strong>市场异常</strong><ul>${marketItems}</ul></div>`
            : `<div><strong>市场异常</strong><div>无</div></div>`;

        const newsBlock = newsItems
            ? `<div style="margin-top:6px;"><strong>宏观事件</strong><ul>${newsItems}</ul></div>`
            : `<div style="margin-top:6px;"><strong>宏观事件</strong><div>无</div></div>`;

        const summary = data.summary ? `<div class="alert-meta">${data.summary}</div>` : "";

        listEl.innerHTML = `${marketBlock}${newsBlock}${summary}`;
        window.__alertData = data;
    }catch(err){
        listEl.textContent = "预警数据获取失败";
    }
}

function toggleMacroPanel(evt){
    const panel = document.getElementById("macroPanel");
    const btn = evt && evt.currentTarget ? evt.currentTarget : document.getElementById("macroToggleBtn");
    const collapsed = panel.classList.toggle("collapsed");
    if (btn) btn.textContent = collapsed ? "展开" : "收起";
}

function initMacroToggleButton(){
    const btn = document.getElementById("macroToggleBtn");
    if (!btn) return;
    let touchMoved = false;
    let startX = 0;
    let startY = 0;
    let lastTouchToggle = 0;

    btn.addEventListener("touchstart", (e) => {
        const t = e.touches && e.touches[0];
        if (!t) return;
        touchMoved = false;
        startX = t.clientX;
        startY = t.clientY;
    }, { passive: true });

    btn.addEventListener("touchmove", (e) => {
        const t = e.touches && e.touches[0];
        if (!t) return;
        const dx = Math.abs(t.clientX - startX);
        const dy = Math.abs(t.clientY - startY);
        if (dx > 6 || dy > 6) touchMoved = true;
    }, { passive: true });

    btn.addEventListener("touchend", (e) => {
        if (touchMoved) return;
        lastTouchToggle = Date.now();
        toggleMacroPanel(e);
    });

    btn.addEventListener("click", (e) => {
        if (Date.now() - lastTouchToggle < 500) return;
        toggleMacroPanel(e);
    });
}

async function copyMacro(){
    const light = document.getElementById("macroLight");
    const advice = document.getElementById("macroAdvice");
    const meta = document.getElementById("macroMeta");
    const alertTitle = document.getElementById("alertTitle");
    const alertData = window.__alertData || {};
    const marketAlerts = Array.isArray(alertData.marketAlerts) ? alertData.marketAlerts : [];
    const newsAlerts = Array.isArray(alertData.newsAlerts) ? alertData.newsAlerts : [];
    const alertLines = [];
    if (marketAlerts.length){
        alertLines.push("市场异常：");
        marketAlerts.forEach(a => alertLines.push("• " + a));
    }
    if (newsAlerts.length){
        alertLines.push("宏观事件：");
        newsAlerts.forEach(a => {
            if (typeof a === "string"){
                alertLines.push("• " + a);
            } else {
                const t = a.title || "";
                const l = a.link || "";
                const tag = a.tag || "事件";
                alertLines.push("• [" + tag + "] " + t + (l ? " (" + l + ")" : ""));
            }
        });
    }
    if (alertData.summary) alertLines.push(alertData.summary);
    const alertText = alertLines.join("\n");
    const text = [
        "宏观AI策略",
        light ? light.textContent.trim() : "",
        advice ? advice.textContent.trim() : "",
        meta ? meta.textContent.trim() : "",
        alertTitle ? alertTitle.textContent.trim() : "宏观预警",
        alertText || "无"
    ].filter(Boolean).join("\n");
    try{
        await navigator.clipboard.writeText(text);
        alert("已复制宏观AI策略");
    }catch(err){
        alert("复制失败，请检查浏览器权限");
    }
}

    const showing = panel.style.display !== "none";
